name: RAG Pipeline CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # ── Step 1: Checkout code ─────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v3

      # ── Step 2: Configure AWS credentials ────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-2

      # ── Step 3: Login to Amazon ECR ──────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # ── Step 4: Build and push Docker image to ECR ───────────
      - name: Build and push Docker image
        run: |
          docker build -t rag-pipeline .
          docker tag rag-pipeline:latest 316412036948.dkr.ecr.us-east-2.amazonaws.com/rag-pipeline-repo:rag-latest
          docker push 316412036948.dkr.ecr.us-east-2.amazonaws.com/rag-pipeline-repo:rag-latest

      # ── Step 5: Update kubeconfig for EKS ────────────────────
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region us-east-2 \
            --name rag-pipeline

      # ── Step 6: Deploy to EKS ─────────────────────────────────
      - name: Deploy to EKS
        run: |
          kubectl rollout restart deployment/rag-pipeline
          kubectl rollout status deployment/rag-pipeline --timeout=120s